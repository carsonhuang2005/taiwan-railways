<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣全鐵道路網圖 - Carson Huang' Blog</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 引入 Google Noto Sans TC 字體 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            font-family: 'Noto Sans TC', sans-serif; /* ✨ 固定全網頁字體 */
        }
        
        /* 路線名稱提示框精緻樣式 */
        .line-tooltip {
            background-color: rgba(0, 0, 0, 0.8) !important;
            color: #ffffff !important;
            border: 1px solid #444 !important;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
       
        /* 🪨 真正的黑曜石控制面板容器 */
        #custom-controls {
            background-color: #222222 !important;
            color: #ffffff !important;
            border: 2px solid #444444 !important;
            border-radius: 8px;
            padding: 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
            font-family: 'Noto Sans TC', sans-serif !important;
            margin-top: 10px;
            margin-right: 10px;
        }
        
        /* 表格本體 */
        .obsidian-table {
            border-collapse: collapse;
            width: 260px; /* 可以依喜好調整寬度 */
        }
        
        /* 表格標頭 (系統 | 車站 | 路線) */
        .obsidian-table th {
            border-bottom: 2px solid #444;
            padding-bottom: 8px;
            font-size: 12px;
            color: #888;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
        }
        .obsidian-table th:first-child {
            text-align: left; /* 「系統」欄位靠左對齊 */
        }
        
        /* 表格格子內贅微調 */
        .obsidian-table td {
            padding: 8px 4px;
            vertical-align: middle;
            font-size: 13px;
        }
        
        /* 讓「車站」與「路線」的勾選框格子在正中間 */
        .obsidian-table td:nth-child(2), 
        .obsidian-table td:nth-child(3) {
            text-align: center;
        }
        
        /* 滑鼠移過去橫列有低調的高亮效果 */
        .obsidian-table tr:hover td {
            background-color: #2a2a2a;
        }
        
        /* 🪨 黑曜石風自訂核取方塊 (Checkbox) */
        .obsidian-table input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid #555;
            border-radius: 4px;
            background-color: #1a1a1a; /* 黑底 */
            cursor: pointer;
            position: relative;
            display: inline-block;
            vertical-align: middle;
            transition: all 0.2s ease;
            margin: 0;
        }
        
        /* 勾選時變白底 */
        .obsidian-table input[type="checkbox"]:checked {
            background-color: #ffffff; 
            border-color: #ffffff;
        }
        
        /* 產生精緻的黑勾勾 */
        .obsidian-table input[type="checkbox"]:checked::after {
            content: "";
            position: absolute;
            left: 4px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid #1a1a1a; /* 黑勾 */
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 建立獨立的圖層群組（捷運依系統分開，方便使用者細緻開關）
        // 將「路線」與「車站」圖層徹底分開宣告，達成表格獨立開關
        var traLayer = L.layerGroup(),     traStationsLayer = L.layerGroup();
        var thsrLayer = L.layerGroup(),    thsrStationsLayer = L.layerGroup();
        var trtcLayer = L.layerGroup(),    trtcStationsLayer = L.layerGroup();
        var krtcLayer = L.layerGroup(),    krtcStationsLayer = L.layerGroup();
        var klrtLayer = L.layerGroup(),    klrtStationsLayer = L.layerGroup();
        var tmrtLayer = L.layerGroup(),    tmrtStationsLayer = L.layerGroup();
        var tymcLayer = L.layerGroup(),    tymcStationsLayer = L.layerGroup();

        // 1. 初始化地圖，將中心點對準台灣（開啟 Canvas 渲染加速）
        var map = L.map('map', {
            zoomSnap: 0.5,
            wheelPxPerZoomLevel: 120,
            preferCanvas: true // ✨ 強制 Canvas 渲染，保證加上捷運後完全不卡頓
        }).setView([23.6, 121.0], 7.5);

        map.attributionControl.addAttribution('Data Curated by Carson Huang, Land Map from <a href="https://github.com/g0v/twgeojson" target="_blank">g0v GitHub</a>, Railway & Station Data from <a href="https://tdx.transportdata.tw/" target="_blank">MOTC TDX</a>');

        // Home 按鈕
        L.Control.Home = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function (map) {
                var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-home');
                container.innerHTML = '<svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>';
                container.title = "Reset View";
                L.DomEvent.on(container, 'click', function (e) {
                    L.DomEvent.stopPropagation(e);
                    map.flyTo([23.6, 121.0], 7.5); 
                });
                return container;
            }
        });
        map.addControl(new L.Control.Home());

        // 💡 統一管理顏色對照表（加上系統前綴，徹底完美解決北捷與中捷綠線撞名問題）
        function getLineColor(uniqueLineId) {
            // --- 高鐵 ---
            if (uniqueLineId === "THSR") return "#FF5500";   // 高鐵專屬橘

            // --- 台鐵 ---
            if (uniqueLineId === "WL") return "#1C3A5E";     // 西部幹線 / 經典鋼鐵藍
            if (uniqueLineId === "WL-C") return "#E67E22";   // 海線 / 日落浪花橘
            if (uniqueLineId === "EL") return "#0083B0";     // 東部幹線 / 太平洋蔚藍
            if (uniqueLineId === "SL") return "#00A86B";     // 南迴線 / 山海交織翠
            if (uniqueLineId === "JJ") return "#D4AC0D";     // 集集線 / 樟香懷舊黃
            if (uniqueLineId === "NW") return "#2E7D32";     // 內灣線 / 野薑花油綠
            if (uniqueLineId === "LJ") return "#4C7FB2";     // 六家線 / 科技銀藍色
            if (uniqueLineId === "PX") return "#7EC0EE";     // 平溪線 / 天燈天青色
            if (uniqueLineId === "SA") return "#34495E";     // 深澳線 / 奇岩海岸藍
            if (uniqueLineId === "SH") return "#FF6F00";     // 沙崙線 / 雙鐵活力橘
            if (uniqueLineId === "SU") return "#40E0D0";     // 蘇澳線 / 冷泉 Tiffany 綠

            // --- 台北捷運 (TRTC) ---
            if (uniqueLineId === "TRTC-BR") return "#C48D32"; // 文湖線棕
            if (uniqueLineId === "TRTC-R") return "#E4002C";  // 淡水信義紅
            if (uniqueLineId === "TRTC-G") return "#008659";  // 松山新店綠
            if (uniqueLineId === "TRTC-O") return "#F8B616";  // 中和新蘆橘
            if (uniqueLineId === "TRTC-BL") return "#0070BD"; // 板南線藍

            // --- 高雄捷運 (KRTC) & 輕軌 (KLRT) ---
            if (uniqueLineId === "KRTC-R") return "#E30964";  // 高捷紅線
            if (uniqueLineId === "KRTC-O") return "#FF9500";  // 高捷橘線
            if (uniqueLineId === "KLRT-C") return "#8FC31F";  // 高雄輕軌綠

            // --- 台中捷運 (TMRT) ---
            if (uniqueLineId === "TMRT-G") return "#8EC31C";  // 中捷烏日文心北屯綠

            // --- 桃園捷運 (TYMC) ---
            if (uniqueLineId === "TYMC-A") return "#8246AF";  // 桃園機捷紫

            return "#444444"; // 預設灰色
        }

        // 💡 封裝畫鐵軌的邏輯（支援系統代號前綴）
        function drawRailLines(geoJsonData, targetLayer, systemPrefix, defaultLineId) {
            L.geoJSON(geoJsonData, {
                style: function(feature) {
                    var model = feature.properties.model || {};
                    var rawLineId = model.LineID || defaultLineId;
                    
                    // 如果有給系統前綴（如 TRTC），就拼成 TRTC-G；台鐵不需要前綴
                    var uniqueId = systemPrefix ? `${systemPrefix}-${rawLineId}` : rawLineId;
                    
                    return {
                        color: getLineColor(uniqueId),
                        weight: systemPrefix === null && rawLineId === "THSR" ? 2.5 : 2, 
                        opacity: 0.85
                    };
                },
                onEachFeature: function (feature, layer) {
                    var model = feature.properties.model || {};
                    var lineName = model.LineName || "未命名路線";

                    layer.bindTooltip(lineName, { sticky: true, direction: 'auto', className: 'line-tooltip' });
                    layer.on('mouseover', function (e) {
                        var targetLayer = e.target;
                        targetLayer.setStyle({ weight: 5, opacity: 1.0 });
                    });
                    layer.on('mouseout', function (e) {
                        var targetLayer = e.target;
                        var rawLineId = model.LineID || defaultLineId;
                        targetLayer.setStyle({
                            weight: systemPrefix === null && rawLineId === "THSR" ? 4 : 2,
                            opacity: 0.85
                        });
                    });
                }
            }).addTo(targetLayer);
        }

        // 💡 封裝畫車站點點的邏輯（自動辨識捷運代碼開頭）
        function drawStations(geoJsonData, targetLayer, systemPrefix, isTra = false) {
            L.geoJSON(geoJsonData, {
                pointToLayer: function (feature, latlng) {
                    var model = feature.properties.model || {};
                    var stationId = model.StationID || "";
                    var finalLineId = "";

                    if (isTra) {
                        // 保留你原本精心調教的台鐵車站判斷邏輯
                        var idNum = parseInt(stationId, 10);
                        if (idNum >= 900 && idNum <= 1250) {
                            if (idNum >= 1191 && idNum <= 1193) finalLineId = "NW";
                            else if (idNum >= 1201 && idNum <= 1208) finalLineId = "NW";
                            else if (idNum === 1194) finalLineId = "LJ";
                            else finalLineId = "WL";
                        }
                        else if (idNum >= 2110 && idNum <= 2260) { finalLineId = "WL-C"; }
                        else if (idNum >= 3140 && idNum <= 4400) {
                            if (idNum >= 3431 && idNum <= 3436) finalLineId = "JJ";
                            else if (idNum >= 4271 && idNum <= 4272) finalLineId = "SH";
                            else finalLineId = "WL";
                        }
                        else if (idNum >= 4410 && idNum <= 5000) { finalLineId = "WL"; }
                        else if (idNum >= 5010 && idNum <= 6000) { finalLineId = "SL"; }
                        else if (idNum >= 6010 && idNum <= 7000) { finalLineId = "EL"; }
                        else if (idNum >= 7010 && idNum <= 7110) { finalLineId = "EL"; }
                        else if (idNum === 7130) { finalLineId = "EL"; }
                        else if (idNum === 7120) { finalLineId = "SU"; }
                        else if (idNum >= 7140 && idNum <= 7390) {
                            if (idNum >= 7331 && idNum <= 7336) finalLineId = "PX";
                            else if (idNum >= 7361 && idNum <= 7362) finalLineId = "SA";
                            else finalLineId = "EL";
                        }
                        else { finalLineId = "OTHER"; }
                    } else if (systemPrefix === null) {
                        // 高鐵
                        finalLineId = "THSR";
                    } else {
                        // 捷運系列：用正規表達式直接抓取英文開頭（例如 BL12 抓出 BL，BR01 抓出 BR）
                        var match = stationId.match(/^([A-Za-z]+)/);
                        var rawLineCode = match ? match[1] : "UNKNOWN";
                        finalLineId = `${systemPrefix}-${rawLineCode}`;
                    }

                    var stationColor = getLineColor(finalLineId);
                    return L.circleMarker(latlng, {
                        radius: systemPrefix === null ? 2.5 : 2, // 高鐵大點，捷運小點
                        fillColor: stationColor,
                        color: stationColor,
                        weight: 1,
                        fillOpacity: 1,

                        // 增加一個寬達 15 像素的「隱形滑鼠偵測外圈」，讓滑鼠靠近就能觸發
                        stroke: true,
                        bubbleTooltip: true // 允許泡泡提示提早觸發
                    }).setStyle({ stroke: true, weight: 6, color: 'transparent' }); // 👈 強制把外框變成 6px 寬的透明點點！
                },
                onEachFeature: function (feature, layer) {
                    var model = feature.properties.model || {};
                    var stationName = model.StationName || "未知車站";
                    layer.bindTooltip(stationName, { permanent: false, direction: 'top' });
                }
            }).addTo(targetLayer);
        }

        // 2. 嚴謹大胃王版：一口氣載入 13 個 JSON 檔案（5個原本的 + 8個新捷運的）
        const files = [
            { name: '陸地底圖', url: './data/twCounty2010.geo.json' },
            { name: '台鐵線路', url: './data/tra_lines.json' },
            { name: '台鐵車站', url: './data/tra_stations.json' },
            { name: '高鐵線路', url: './data/thsr_lines.json' },
            { name: '高鐵車站', url: './data/thsr_stations.json' },
            { name: '北捷線路', url: './data/trtc_lines.json' },
            { name: '北捷車站', url: './data/trtc_stations.json' },
            { name: '高捷線路', url: './data/krtc_lines.json' },
            { name: '高捷車站', url: './data/krtc_stations.json' },
            { name: '高雄輕軌線路', url: './data/klrt_lines.json' },
            { name: '高雄輕軌車站', url: './data/klrt_stations.json' },
            { name: '中捷線路', url: './data/tmrt_lines.json' },
            { name: '中捷車站', url: './data/tmrt_stations.json' },
            { name: '桃捷線路', url: './data/tymc_lines.json' },
            { name: '桃捷車站', url: './data/tymc_stations.json' }
        ];

        Promise.all(
            files.map(file => 
                fetch(file.url)
                    .then(res => {
                        if (!res.ok) throw new Error(`找不到檔案 (狀態碼 ${res.status})`);
                        return res.json();
                    })
                    .catch(err => {
                        console.error(`❌ 【${file.name}】讀取失敗！原因：`, err.message || err);
                        throw err;
                    })
            )
        )
        .then(([
            landData, 
            traLines, traStations, 
            thsrLines, thsrStations,
            trtcLines, trtcStations,
            krtcLines, krtcStations,
            klrtLines, klrtStations,
            tmrtLines, tmrtStations,
            tymcLines, tymcStations
        ]) => {
            
            // 2-1. 渲染台灣陸地底圖（邊線加粗、顏色微調稍白）
            L.geoJSON(landData, {
                style: { 
                    color: "#383838",     // ✨ 邊線顏色加深加亮
                    weight: 1.5,          // ✨ 邊線粗細從 1 改為 1.5
                    fillColor: "#282828", // ✨ 填滿顏色從 #1d1d1d 調白一點到 #282828
                    fillOpacity: 1.0 
                }
            }).addTo(map);

            // 2-2. 畫線路 (資料來源, 丟進哪個圖層, 系統前綴, 預設代碼)
            drawRailLines(traLines, traLayer, null, "WL");
            drawRailLines(thsrLines, thsrLayer, null, "THSR"); // 💡 高鐵沒有代號，預設給 THSR
            drawRailLines(trtcLines, trtcLayer, "TRTC", "BL");
            drawRailLines(krtcLines, krtcLayer, "KRTC", "R");
            drawRailLines(klrtLines, klrtLayer, "KLRT", "C");
            drawRailLines(tmrtLines, tmrtLayer, "TMRT", "G");
            drawRailLines(tymcLines, tymcLayer, "TYMC", "A");

            // 2-3. 畫車站 (資料來源, 丟進哪個圖層, 系統前綴, 是否為台鐵)
            drawStations(traStations, traStationsLayer, null, true);
            drawStations(thsrStations, thsrStationsLayer, null, false);
            drawStations(trtcStations, trtcStationsLayer, "TRTC");
            drawStations(krtcStations, krtcStationsLayer, "KRTC");
            drawStations(klrtStations, klrtStationsLayer, "KLRT");
            drawStations(tmrtStations, tmrtStationsLayer, "TMRT");
            drawStations(tymcStations, tymcStationsLayer, "TYMC");

            // 預設全部開啟顯示
            traLayer.addTo(map);     traStationsLayer.addTo(map);
            thsrLayer.addTo(map);    thsrStationsLayer.addTo(map);
            trtcLayer.addTo(map);    trtcStationsLayer.addTo(map);
            krtcLayer.addTo(map);    krtcStationsLayer.addTo(map);
            klrtLayer.addTo(map);    klrtStationsLayer.addTo(map);
            tmrtLayer.addTo(map);    tmrtStationsLayer.addTo(map);
            tymcLayer.addTo(map);    tymcStationsLayer.addTo(map);

            // 💡 1. 自製真正的黑曜石控制表格 HTML
            var tableHtml = `
            <div id="custom-controls" class="leaflet-control">
                <table class="obsidian-table">
                    <thead>
                        <tr>
                            <th>系統</th>
                            <th>車站</th>
                            <th>路線</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>臺灣鐵路 (TRA)</td><td><input type="checkbox" data-layer="traStations" checked></td><td><input type="checkbox" data-layer="tra" checked></td></tr>
                        <tr><td>台灣高鐵 (THSR)</td><td><input type="checkbox" data-layer="thsrStations" checked></td><td><input type="checkbox" data-layer="thsr" checked></td></tr>
                        <tr><td>臺北捷運 (TRTC)</td><td><input type="checkbox" data-layer="trtcStations" checked></td><td><input type="checkbox" data-layer="trtc" checked></td></tr>
                        <tr><td>高雄捷運 (KRTC)</td><td><input type="checkbox" data-layer="krtcStations" checked></td><td><input type="checkbox" data-layer="krtc" checked></td></tr>
                        <tr><td>高雄輕軌 (KLRT)</td><td><input type="checkbox" data-layer="klrtStations" checked></td><td><input type="checkbox" data-layer="klrt" checked></td></tr>
                        <tr><td>臺中捷運 (TMRT)</td><td><input type="checkbox" data-layer="tmrtStations" checked></td><td><input type="checkbox" data-layer="tmrt" checked></td></tr>
                        <tr><td>桃園捷運 (TYMC)</td><td><input type="checkbox" data-layer="tymcStations" checked></td><td><input type="checkbox" data-layer="tymc" checked></td></tr>
                    </tbody>
                </table>
            </div>
            `;
            
            // 💡 2. 把表格塞進地圖右上角
            var controlContainer = document.querySelector('.leaflet-top.leaflet-right');
            controlContainer.insertAdjacentHTML('beforeend', tableHtml);
            
            // 💡 3. 對照表：把 HTML 標籤跟你的圖層變數綁在一起
            var layerMap = {
                'tra': traLayer,             'traStations': traStationsLayer,
                'thsr': thsrLayer,           'thsrStations': thsrStationsLayer,
                'trtc': trtcLayer,           'trtcStations': trtcStationsLayer,
                'krtc': krtcLayer,           'krtcStations': krtcStationsLayer,
                'klrt': klrtLayer,           'klrtStations': klrtStationsLayer,
                'tmrt': tmrtLayer,           'tmrtStations': tmrtStationsLayer,
                'tymc': tymcLayer,           'tymcStations': tymcStationsLayer
            };
            
            // 💡 4. 監聽表格內勾選框的切換動作
            document.querySelector('.obsidian-table').addEventListener('change', function (e) {
                var layerKey = e.target.getAttribute('data-layer');
                var targetLayer = layerMap[layerKey];
                if (targetLayer) {
                    if (e.target.checked) {
                        map.addLayer(targetLayer);
                    } else {
                        map.removeLayer(targetLayer);
                    }
                }
            });
            
            // 防止在表格上滾動滑鼠滾輪時，地圖也跟著放大縮小
            var customCtrl = document.getElementById('custom-controls');
            L.DomEvent.disableScrollPropagation(customCtrl);
            L.DomEvent.disableClickPropagation(customCtrl);

            console.log("全台軌道路網完全體渲染成功！");
        })
        .catch(err => {
            console.error("有檔案讀取失敗，渲染中斷：", err);
        });
    </script>
</body>
</html>
